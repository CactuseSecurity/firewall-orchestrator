name: FWO Test Install

on:
  push:
    branches:
      - main
      - develop
      - importer-rework

  pull_request:

jobs:
  test-install:
    name: Test install on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      RUNNING_ON_GITHUB_ACTIONS: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install build-essential ldap-utils libldap2-dev libsasl2-dev
          pip install ansible psycopg2-binary python-ldap requests

      - name: Run Ansible test install
        run: |
          cd /home/runner/work/firewall-orchestrator/firewall-orchestrator
          ansible-playbook -e force_install=true -e "ansible_python_interpreter=$(which python)" site.yml -K

      - name: Running in GitHub actions requires testing puppeteer pdf creation separately
        if: ${{ env.RUNNING_ON_GITHUB_ACTIONS == 'true' }}
        run: |
          cd /home/runner/work/firewall-orchestrator/firewall-orchestrator/roles/tests-unit/files/FWO.Test
          dotnet restore
          dotnet build
          dotnet test --filter "Name=HtmlToPdfTest"


  python-code-check:
    name: Python Code Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11' 

      - run: pip install -r roles/importer/files/importer/requirements.txt

      - run: pip install -r scripts/customizing/app_data_import/requirements-for-app-data-import.txt

      - uses: astral-sh/ruff-action@v4.0.0 # Ruff uses immutable tags, so we can pin to a specific version
        with:
          version: "0.15.0"

      - run: pyright

      - run: ruff check
      
      - run: ruff format --exit-non-zero-on-format
