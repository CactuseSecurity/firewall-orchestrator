# installs docker and the hasura image in a container

- name: Install packages for api tooling
  package:
    name: "{{ item }}"
    state: present
  loop:
    - python3-pip
    - python3-virtualenv
  become: true

- name: read dbadmin pwd from secrets file
  slurp:
    src: "{{ dbadmin_password_file }}"
  register: api_user_password
  become: true

- name: decode dbadmin pwd
  set_fact:
    api_user_password: "{{ api_user_password['content'] | b64decode | trim }}"

- name: read jwt public key from file as JWT secret
  slurp:
    src: "{{ jwt_public_key_file }}"
  register: api_hasura_jwt_secret_dict
  become: true

- name: decode key
  set_fact:
    api_hasura_jwt_secret: "{{ api_hasura_jwt_secret_dict['content'] | b64decode }}"

- name: make sure {{ fworch_secrets_dir }} exists
  file:
    path: "{{ fworch_secrets_dir }}"
    state: directory
    mode: "0750"
    owner: "{{ fworch_user }}"
    group: "{{ postgres_group }}"
  become: true

- name: check for existing hasura admin secret file
  stat:
    path: "{{ fworch_secrets_dir }}/hasura_admin_pwd"
  register: hasura_admin_secret_file
  become: true

- name: read existing hasura admin secret during upgrade
  slurp:
    src: "{{ fworch_secrets_dir }}/hasura_admin_pwd"
  register: existing_hasura_admin_secret
  become: true
  when:
    - installation_mode == "upgrade"
    - hasura_admin_secret_file.stat.exists
    - api_use_existing_hasura_on_upgrade | default(false) | bool

- name: set hasura admin secret from existing file
  set_fact:
    api_hasura_admin_secret: "{{ existing_hasura_admin_secret['content'] | b64decode | trim }}"
  when:
    - installation_mode == "upgrade"
    - hasura_admin_secret_file.stat.exists
    - api_use_existing_hasura_on_upgrade | default(false) | bool

- name: set static hasura admin pwd for test purposes only
  set_fact:
    api_hasura_admin_secret: "{{ api_hasura_admin_test_password }}"
  when:
    - api_hasura_admin_secret is not defined
    - testkeys is defined
    - testkeys | bool

- name: set random hasura admin password
  set_fact:
    api_hasura_admin_secret: "{{ randomly_generated_pwd }}"
  when:
    - api_hasura_admin_secret is not defined

- name: write hasura admin password to secrets directory
  copy:
    content: "{{ api_hasura_admin_secret }}\n"
    dest: "{{ fworch_secrets_dir }}/hasura_admin_pwd"
    mode: "0600"
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
  become: true
  when:
    - installation_mode != "upgrade" or not (api_use_existing_hasura_on_upgrade | default(false) | bool) or not hasura_admin_secret_file.stat.exists

- name: check for existing hasura cli file
  stat:
    path: "{{ api_hasura_cli_bin }}"
  register: api_cli_check

# Only send Authorization when a token is provided.
- name: build GitHub auth header
  set_fact:
    api_github_auth_header: "{{ {'Authorization': 'Bearer ' ~ api_github_token} if api_github_token is defined else {} }}"

# only download new version of api cli, when not restoring from backup:
- name: Get Hasura release info from GitHub (authenticated)
  uri:
    url: "https://api.github.com/repos/hasura/graphql-engine/releases/tags/{{ api_hasura_version }}"
    method: GET
    headers: "{{ {'Accept': 'application/vnd.github+json'} | combine(api_github_auth_header) }}"
    return_content: true
  register: hasura_release
  environment: "{{ proxy_env }}"
  failed_when: false
  retries: 3
  delay: 5
  until: hasura_release.status | default(-1) == 200
  when:
    - not api_cli_check.stat.exists
    - not api_use_existing_hasura_on_upgrade | default(false) | bool

- name: Extract Hasura CLI asset id for {{ linux_architecture }}
  set_fact:
    hasura_cli_asset_id: >-
      {{
        hasura_release.json.assets
        | selectattr('name', 'equalto', 'cli-hasura-linux-' ~ linux_architecture)
        | map(attribute='id')
        | list
        | first
      }}
  when:
    - not api_cli_check.stat.exists
    - not api_use_existing_hasura_on_upgrade | default(false) | bool
    - hasura_release.status | default(-1) == 200

- name: download {{ api_hasura_version }} hasura cli binary via authenticated GitHub access
  get_url:
    url: "https://api.github.com/repos/hasura/graphql-engine/releases/assets/{{ hasura_cli_asset_id }}"
    dest: "{{ api_hasura_cli_bin }}"
    headers: "{{ {'Accept': 'application/octet-stream'} | combine(api_github_auth_header) }}"
    force: true
    mode: "0755"
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
  environment: "{{ proxy_env }}"
  register: api_hasura_cli_download
  retries: 3
  delay: 5
  until: api_hasura_cli_download is succeeded
  become: true
  when:
    - not api_cli_check.stat.exists
    - not api_use_existing_hasura_on_upgrade | default(false) | bool
    - hasura_cli_asset_id is defined

- name: download {{ api_hasura_version }} hasura cli binary via direct GitHub download
  get_url:
    url: "https://github.com/hasura/graphql-engine/releases/download/{{ api_hasura_version }}/cli-hasura-linux-{{ linux_architecture }}"
    dest: "{{ api_hasura_cli_bin }}"
    force: true
    mode: "0755"
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
  environment: "{{ proxy_env }}"
  register: api_hasura_cli_download_fallback
  retries: 3
  delay: 5
  until: api_hasura_cli_download_fallback is succeeded
  become: true
  when:
    - not api_cli_check.stat.exists
    - not api_use_existing_hasura_on_upgrade | default(false) | bool
    - hasura_cli_asset_id is not defined

- name: verify hasura cli binary is executable
  command: "{{ api_hasura_cli_bin }} version"
  register: hasura_cli_version_check
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ fworch_user }}"
  environment: "{{ proxy_env }}"
  when:
    - api_cli_check.stat.exists
    - not api_use_existing_hasura_on_upgrade | default(false) | bool

- name: ensure api project directory exists
  file:
    path: "{{ api_home }}/{{ product_name }}"
    state: directory
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
    mode: "0755"
  become: true
  when:
    - not api_use_existing_hasura_on_upgrade | default(false) | bool

- name: show hasura cli verification result
  debug:
    msg: "Hasura CLI binary check returned rc={{ hasura_cli_version_check.rc }}. Continuing because metadata is imported via API."
  when:
    - hasura_cli_version_check is defined
    - hasura_cli_version_check.rc is defined
    - hasura_cli_version_check.rc != 0

- name: set hasura env variable
  set_fact:
    hasura_env:
      HASURA_GRAPHQL_DATABASE_URL: "postgres://{{ api_user }}:{{ api_user_password }}@{{ fworch_db_host }}:{{ fworch_db_port }}/{{ fworch_db_name }}"
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
      HASURA_GRAPHQL_ADMIN_SECRET: "{{ api_hasura_admin_secret }}"
      HASURA_GRAPHQL_SERVER_HOST: "0.0.0.0"
      HASURA_GRAPHQL_SERVER_PORT: "8080"
      HASURA_GRAPHQL_LOG_LEVEL: "{{ api_log_level }}"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: "{{ api_HASURA_GRAPHQL_ENABLED_LOG_TYPES }}"
      HASURA_GRAPHQL_CONSOLE_ASSETS_DIR: "/srv/console-assets"
      HASURA_GRAPHQL_V1_BOOLEAN_NULL_COLLAPSE: "true"
      HASURA_GRAPHQL_CORS_DOMAIN: "*"
      HASURA_GRAPHQL_INFER_FUNCTION_PERMISSIONS: "{{ api_HASURA_GRAPHQL_INFER_FUNCTION_PERMISSIONS }}"
      HASURA_GRAPHQL_JWT_SECRET: "{{ {'type': api_hasura_jwt_alg, 'key': api_hasura_jwt_secret, 'claims_namespace_path': '$'} | to_json }}"
      HTTP_PROXY: "{{ http_proxy }}"
      HTTPS_PROXY: "{{ https_proxy }}"
      http_proxy: "{{ http_proxy }}"
      https_proxy: "{{ https_proxy }}"
      no_proxy: "{{ no_proxy }}"
      NO_PROXY: "{{ no_proxy }}"

- name: show hasura env for debugging
  debug:
    var: hasura_env
  when: debug_level > '1'

- name: get existing hasura container state
  command: "docker inspect -f '{% raw %}{{.State.Status}}{% endraw %}' {{ api_container_name }}"
  register: existing_hasura_container_info
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ fworch_user }}"

- name: set hasura container reuse mode
  set_fact:
    api_reuse_existing_hasura_container: >-
      {{
        installation_mode == "upgrade"
        and (api_use_existing_hasura_on_upgrade | default(false) | bool)
        and (existing_hasura_container_info.rc | default(1) == 0)
      }}

- name: request Docker Hub token for hasura/graphql-engine
  uri:
    url: "https://auth.docker.io/token?service=registry.docker.io&scope=repository:hasura/graphql-engine:pull"
    method: GET
    return_content: true
  register: dockerhub_token
  environment: "{{ proxy_env }}"
  failed_when: dockerhub_token.status | default(-1) != 200
  when: not api_reuse_existing_hasura_container | bool

- name: check Docker Hub manifest access for hasura/graphql-engine:{{ api_hasura_version }}
  uri:
    url: "https://registry-1.docker.io/v2/hasura/graphql-engine/manifests/{{ api_hasura_version }}"
    method: HEAD
    headers:
      Authorization: "Bearer {{ dockerhub_token.json.token }}"
      Accept: "application/vnd.docker.distribution.manifest.v2+json"
    status_code:
      - 200
  register: dockerhub_manifest_check
  environment: "{{ proxy_env }}"
  failed_when: false
  when: not api_reuse_existing_hasura_container | bool

- name: fail if Docker Hub manifest access is blocked
  fail:
    msg: >-
      Cannot access Docker Hub manifest for hasura/graphql-engine:{{ api_hasura_version }}
      (HTTP {{ dockerhub_manifest_check.status | default('unknown') }}). This typically indicates
      blocked registry access or proxy restrictions. Ensure the host can reach registry-1.docker.io
      or configure a registry mirror.
  when:
    - not api_reuse_existing_hasura_container | bool
    - dockerhub_manifest_check.status | default(0) != 200

- name: start existing hasura container during upgrade
  command: "docker start {{ api_container_name }}"
  register: docker_return
  changed_when: true
  become: true
  become_user: "{{ fworch_user }}"
  environment: "{{ proxy_env }}"
  when: api_reuse_existing_hasura_container | bool

- name: write hasura env file
  copy:
    dest: "{{ api_home }}/hasura.env"
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
    mode: "0600"
    content: |
      {% for item in hasura_env | dict2items %}
      {{ item.key }}={{ item.value }}
      {% endfor %}
  become: true
  when: not api_reuse_existing_hasura_container | bool

- name: remove existing hasura container before recreate
  command: "docker rm -f {{ api_container_name }}"
  register: docker_remove_return
  changed_when: docker_remove_return.rc == 0
  failed_when: false
  become: true
  become_user: "{{ fworch_user }}"
  when: not api_reuse_existing_hasura_container | bool

- name: start hasura container
  command: >
    docker run -d
    --name {{ api_container_name }}
    --network host
    --log-driver syslog
    --log-opt syslog-address={{ syslog_proto }}://{{ syslog_host }}:{{ syslog_port }}
    --log-opt syslog-facility=daemon
    --log-opt tag={{ api_container_name }}
    --env-file {{ api_home }}/hasura.env
    --user 1001:1001
    hasura/graphql-engine:{{ api_hasura_version }}
  register: docker_return
  changed_when: true
  become: true
  become_user: "{{ fworch_user }}"
  environment: "{{ proxy_env }}"
  when: not api_reuse_existing_hasura_container | bool

- name: show docker result
  debug:
    var: docker_return
  when: debug_level > '1'

- name: get current hasura container state
  command: "docker inspect -f '{% raw %}{{.State.Status}}{% endraw %}' {{ api_container_name }}"
  register: result
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ fworch_user }}"

- name: Print the status of the container in case of problems only
  fail:
    msg: "The container status is: {{ result }}"
  when:
    - result.rc == 0
    - result.stdout == 'exited'

- name: fetch hasura container logs after startup failure
  command: "docker logs {{ api_container_name }}"
  register: hasura_container_logs
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ fworch_user }}"
  when:
    - result.rc == 0
    - result.stdout == 'exited'

- name: fail with hasura container logs after startup failure
  fail:
    msg: >-
      Hasura container exited during startup.
      stdout={{ hasura_container_logs.stdout | default('') }}
      stderr={{ hasura_container_logs.stderr | default('') }}
  when:
    - result.rc == 0
    - result.stdout == 'exited'

- name: copy hasura systemd service script
  template:
    src: "{{ api_service_name }}.service.j2"
    dest: "/lib/systemd/system/{{ api_service_name }}.service"
    backup: true
    mode: "0644"
    owner: "root"
  become: true

- name: make hasura docker container run at host startup
  systemd:
    name: "{{ api_service_name }}"
    daemon_reload: true
    enabled: true
  become: true

- name: wait for hasura port to become available
  block:
    - name: wait for hasura port
      wait_for:
        port: "{{ api_port }}"
        host: "{{ api_local_listening_ip_address }}"
        connect_timeout: 1
        delay: 10
        timeout: 25
  rescue:
    - name: fetch hasura container state after wait timeout
      command: "docker inspect -f '{% raw %}{{.State.Status}}{% endraw %}' {{ api_container_name }}"
      register: hasura_wait_timeout_state
      changed_when: false
      failed_when: false
      become: true
      become_user: "{{ fworch_user }}"

    - name: fetch hasura container logs after wait timeout
      command: "docker logs {{ api_container_name }}"
      register: hasura_wait_timeout_logs
      changed_when: false
      failed_when: false
      become: true
      become_user: "{{ fworch_user }}"

    - name: fail with hasura diagnostics after wait timeout
      fail:
        msg: >-
          Timed out waiting for Hasura on {{ api_local_listening_ip_address }}:{{ api_port }}.
          container_state={{ hasura_wait_timeout_state.stdout | default('unknown') }}
          stdout={{ hasura_wait_timeout_logs.stdout | default('') }}
          stderr={{ hasura_wait_timeout_logs.stderr | default('') }}

- name: check for existing api dir from restore
  stat:
    path: "{{ api_home }}/{{ product_name }}"
  register: api_metadata_check

- name: import API metadata via metadata API directly from local file
  uri:
    url: "http://{{ api_local_listening_ip_address }}:{{ api_port }}/v1/metadata"
    method: POST
    return_content: true
    body_format: json
    headers:
      Content-Type: application/json
      x-hasura-admin-secret: "{{ api_hasura_admin_secret }}"
      x-hasura-role: "admin"
    body: "{{ lookup('file','replace_metadata.json') | from_json }}"
  when: not api_rollback_is_running | bool
  # do not install latest metadata in case of rollback
  environment:
    http_proxy: ""
    https_proxy: ""
  # do not use http proxy for metadata import

- name: clear hasura service failed state
  command: "systemctl reset-failed {{ api_service_name }}"
  become: true

- name: ensure hasura systemd service is running
  systemd:
    name: "{{ api_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
  become: true
