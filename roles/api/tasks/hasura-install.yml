# installs Hasura CLI and runs Hasura in a Podman-managed container

- name: Install packages for Hasura CLI download
  package:
    name: "{{ item }}"
    state: present
  loop:
    - python3-pip
    - python3-virtualenv
  become: true

- name: read dbadmin pwd from secrets file
  slurp:
    src: "{{ dbadmin_password_file }}"
  register: api_user_password
  become: true

- name: decode dbadmin pwd
  set_fact:
    api_user_password: "{{ api_user_password['content'] | b64decode | trim }}"

- name: read jwt public key from file as JWT secret
  slurp:
    src: "{{ jwt_public_key_file }}"
  register: api_hasura_jwt_secret_dict
  become: true

- name: decode key
  set_fact:
    api_hasura_jwt_secret: "{{ api_hasura_jwt_secret_dict['content'] | b64decode }}"

- name: make sure {{ fworch_secrets_dir }} exists
  file:
    path: "{{ fworch_secrets_dir }}"
    state: directory
    mode: "0750"
    owner: "{{ fworch_user }}"
    group: "{{ postgres_group }}"
  become: true

- name: check for existing hasura admin secret file
  stat:
    path: "{{ fworch_secrets_dir }}/hasura_admin_pwd"
  register: hasura_admin_secret_file
  become: true

- name: read existing hasura admin secret during upgrade
  slurp:
    src: "{{ fworch_secrets_dir }}/hasura_admin_pwd"
  register: existing_hasura_admin_secret
  become: true
  when:
    - installation_mode == "upgrade"
    - hasura_admin_secret_file.stat.exists
    - api_use_existing_hasura_on_upgrade | default(false) | bool

- name: set hasura admin secret from existing file
  set_fact:
    api_hasura_admin_secret: "{{ existing_hasura_admin_secret['content'] | b64decode | trim }}"
  when:
    - installation_mode == "upgrade"
    - hasura_admin_secret_file.stat.exists
    - api_use_existing_hasura_on_upgrade | default(false) | bool

- name: set static hasura admin pwd for test purposes only
  set_fact:
    api_hasura_admin_secret: "{{ api_hasura_admin_test_password }}"
  when:
    - api_hasura_admin_secret is not defined
    - testkeys is defined
    - testkeys | bool

- name: set random hasura admin password
  set_fact:
    api_hasura_admin_secret: "{{ randomly_generated_pwd }}"
  when:
    - api_hasura_admin_secret is not defined

- name: write hasura admin password to secrets directory
  copy:
    content: "{{ api_hasura_admin_secret }}\n"
    dest: "{{ fworch_secrets_dir }}/hasura_admin_pwd"
    mode: "0600"
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
  become: true
  when:
    - installation_mode != "upgrade" or not (api_use_existing_hasura_on_upgrade | default(false) | bool) or not hasura_admin_secret_file.stat.exists

- name: check for existing hasura cli file
  stat:
    path: "{{ api_hasura_cli_bin }}"
  register: api_cli_check

- name: build GitHub auth header
  set_fact:
    api_github_auth_header: "{{ {'Authorization': 'Bearer ' ~ api_github_token} if api_github_token is defined else {} }}"

- name: Get Hasura release info from GitHub (authenticated)
  uri:
    url: "https://api.github.com/repos/hasura/graphql-engine/releases/tags/{{ api_hasura_version }}"
    method: GET
    headers: "{{ {'Accept': 'application/vnd.github+json'} | combine(api_github_auth_header) }}"
    return_content: true
  register: hasura_release
  environment: "{{ proxy_env }}"
  failed_when: false
  retries: 3
  delay: 5
  until: hasura_release.status | default(-1) == 200
  when:
    - not api_cli_check.stat.exists
    - not api_use_existing_hasura_on_upgrade | default(false) | bool

- name: Extract Hasura CLI asset id for {{ linux_architecture }}
  set_fact:
    hasura_cli_asset_id: >-
      {{
        hasura_release.json.assets
        | selectattr('name', 'equalto', 'cli-hasura-linux-' ~ linux_architecture)
        | map(attribute='id')
        | list
        | first
      }}
  when:
    - not api_cli_check.stat.exists
    - not api_use_existing_hasura_on_upgrade | default(false) | bool
    - hasura_release.status | default(-1) == 200

- name: download {{ api_hasura_version }} hasura cli binary via authenticated GitHub access
  get_url:
    url: "https://api.github.com/repos/hasura/graphql-engine/releases/assets/{{ hasura_cli_asset_id }}"
    dest: "{{ api_hasura_cli_bin }}"
    headers: "{{ {'Accept': 'application/octet-stream'} | combine(api_github_auth_header) }}"
    force: true
    mode: "0755"
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
  environment: "{{ proxy_env }}"
  register: api_hasura_cli_download
  retries: 3
  delay: 5
  until: api_hasura_cli_download is succeeded
  become: true
  when:
    - not api_cli_check.stat.exists
    - not api_use_existing_hasura_on_upgrade | default(false) | bool
    - hasura_cli_asset_id is defined

- name: download {{ api_hasura_version }} hasura cli binary via direct GitHub download
  get_url:
    url: "https://github.com/hasura/graphql-engine/releases/download/{{ api_hasura_version }}/cli-hasura-linux-{{ linux_architecture }}"
    dest: "{{ api_hasura_cli_bin }}"
    force: true
    mode: "0755"
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
  environment: "{{ proxy_env }}"
  register: api_hasura_cli_download_fallback
  retries: 3
  delay: 5
  until: api_hasura_cli_download_fallback is succeeded
  become: true
  when:
    - not api_cli_check.stat.exists
    - not api_use_existing_hasura_on_upgrade | default(false) | bool
    - hasura_cli_asset_id is not defined

- name: initialize hasura cli directory
  command: "{{ api_hasura_cli_bin }} init {{ product_name }} --skip-update-check --endpoint http://{{ api_local_listening_ip_address }}:{{ api_port }} --admin-secret {{ api_hasura_admin_secret }}"
  args:
    chdir: "{{ api_home }}"
  become: true
  become_user: "{{ fworch_user }}"
  environment: "{{ proxy_env }}"
  when:
    - not api_cli_check.stat.exists
    - not api_use_existing_hasura_on_upgrade | default(false) | bool

- name: set hasura env variable
  set_fact:
    hasura_env:
      HASURA_GRAPHQL_DATABASE_URL: "postgres://{{ api_user }}:{{ api_user_password }}@{{ fworch_db_host }}:{{ fworch_db_port }}/{{ fworch_db_name }}"
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
      HASURA_GRAPHQL_ADMIN_SECRET: "{{ api_hasura_admin_secret }}"
      HASURA_GRAPHQL_SERVER_HOST: "127.0.0.1"
      HASURA_GRAPHQL_SERVER_PORT: "8080"
      HASURA_GRAPHQL_LOG_LEVEL: "{{ api_log_level }}"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: "{{ api_HASURA_GRAPHQL_ENABLED_LOG_TYPES }}"
      HASURA_GRAPHQL_CONSOLE_ASSETS_DIR: "/srv/console-assets"
      HASURA_GRAPHQL_V1_BOOLEAN_NULL_COLLAPSE: "true"
      HASURA_GRAPHQL_CORS_DOMAIN: "*"
      HASURA_GRAPHQL_INFER_FUNCTION_PERMISSIONS: "{{ api_HASURA_GRAPHQL_INFER_FUNCTION_PERMISSIONS }}"
      HASURA_GRAPHQL_JWT_SECRET: "{{ {'type': api_hasura_jwt_alg, 'key': api_hasura_jwt_secret | regex_replace('\n', '\\n'), 'claims_namespace_path': '$'} | to_json }}"
      HTTP_PROXY: "{{ http_proxy }}"
      HTTPS_PROXY: "{{ https_proxy }}"
      http_proxy: "{{ http_proxy }}"
      https_proxy: "{{ https_proxy }}"
      no_proxy: "{{ no_proxy }}"
      NO_PROXY: "{{ no_proxy }}"

- name: show hasura env for debugging
  debug:
    var: hasura_env
  when: debug_level > '1'

- name: set Hasura image reuse mode
  set_fact:
    api_reuse_existing_hasura_image: >-
      {{
        installation_mode == "upgrade"
        and (api_use_existing_hasura_on_upgrade | default(false) | bool)
        and api_hasura_keep_existing_container | default(true) | bool
      }}

- name: set Hasura systemd dependencies
  set_fact:
    api_hasura_systemd_after: >-
      {{
        ['network.target', 'remote-fs.target', 'nss-lookup.target']
        + (['postgresql.service'] if 'databaseserver' in group_names else [])
      }}

- name: ensure Hasura image is present
  containers.podman.podman_image:
    name: "{{ api_hasura_image }}"
    state: present
  environment: "{{ proxy_env }}"
  become: true
  when:
    - not api_reuse_existing_hasura_image | bool
    - api_rollback_is_running | default(false) | bool == false

- name: write Hasura env file for Podman
  copy:
    dest: "{{ api_env_file }}"
    mode: "0640"
    owner: "root"
    group: "{{ fworch_group }}"
    content: |
      {% for item in hasura_env | dictsort %}
      {{ item.0 }}={{ item.1 }}
      {% endfor %}
  become: true

- name: remove existing Hasura container before recreation
  containers.podman.podman_container:
    name: "{{ api_container_name }}"
    state: absent
  become: true
  when:
    - not api_reuse_existing_hasura_image | bool

- name: force remove existing Hasura container before recreation
  command: "podman rm -f {{ api_container_name }}"
  register: api_force_remove_hasura_container
  changed_when: api_force_remove_hasura_container.rc == 0
  failed_when: false
  become: true
  when:
    - not api_reuse_existing_hasura_image | bool

- name: ensure Hasura container exists
  containers.podman.podman_container:
    name: "{{ api_container_name }}"
    image: "{{ api_hasura_image }}"
    state: created
    recreate: true
    rm: true
    network:
      - host
    user: "1001:1001"
    env: "{{ hasura_env }}"
  become: true
  when:
    - not api_reuse_existing_hasura_image | bool

- name: generate Hasura systemd unit content
  containers.podman.podman_generate_systemd:
    name: "{{ api_container_name }}"
    new: true
    no_header: true
    restart_policy: on-failure
    use_names: true
  register: api_hasura_systemd_unit
  become: true
  when:
    - not api_reuse_existing_hasura_image | bool

- name: install generated Hasura systemd service
  copy:
    content: >-
      {{
        (
          api_hasura_systemd_unit.systemd_units
          | dict2items
          | first
        ).value
        | regex_replace(
            '\\[Service\\]\\n',
            '[Service]\nStandardOutput=journal\nStandardError=journal\nSyslogIdentifier=' ~ product_name ~ '-api\n',
            1
          )
      }}
    dest: "/lib/systemd/system/{{ api_service_name }}.service"
    backup: true
    mode: "0644"
    owner: "root"
  become: true
  when:
    - not api_reuse_existing_hasura_image | bool

- name: remove legacy Docker API service unit
  file:
    path: "/lib/systemd/system/{{ item }}.service"
    state: absent
  become: true
  loop: "{{ api_legacy_service_names | default([]) }}"
  when:
    - item != api_service_name

- name: clear hasura service failed state
  command: "systemctl reset-failed {{ api_service_name }}"
  become: true

- name: ensure hasura service is running
  systemd:
    name: "{{ api_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
  become: true

- name: wait for hasura port to become available
  wait_for:
    port: "{{ api_port }}"
    host: "{{ api_local_listening_ip_address }}"
    connect_timeout: 1
    delay: 3
    timeout: 30

- name: import API metadata via metadata API directly from local file
  uri:
    url: "http://{{ api_local_listening_ip_address }}:{{ api_port }}/v1/metadata"
    method: POST
    return_content: true
    body_format: json
    headers:
      Content-Type: application/json
      x-hasura-admin-secret: "{{ api_hasura_admin_secret }}"
      x-hasura-role: "admin"
    body: "{{ lookup('file','replace_metadata.json') | from_json }}"
  when: not api_rollback_is_running | bool
  environment:
    http_proxy: ""
    https_proxy: ""
