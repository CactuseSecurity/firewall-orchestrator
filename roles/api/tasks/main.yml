# this playbook sets up the api

- name: initialize handler for datarecovery
  set_fact:
    api_handler_guard: start
  changed_when: true
  notify:
  - api handler
  when: installation_mode == "upgrade"

- name: set default hasura upgrade mode for upgrades
  set_fact:
    api_use_existing_hasura_on_upgrade: "{{ api_keep_existing_hasura_on_upgrade | default(false) | bool }}"
  when: installation_mode == "upgrade"

- name: probe GitHub release access for hasura upgrade
  uri:
    url: "https://api.github.com/repos/hasura/graphql-engine/releases/tags/{{ api_hasura_version }}"
    method: GET
    return_content: false
  register: api_hasura_release_access
  environment: "{{ proxy_env }}"
  failed_when: false
  when:
    - installation_mode == "upgrade"
    - not api_use_existing_hasura_on_upgrade | bool

- name: fallback to existing hasura when GitHub is not reachable during upgrade
  set_fact:
    api_use_existing_hasura_on_upgrade: true
  when:
    - installation_mode == "upgrade"
    - not api_use_existing_hasura_on_upgrade | bool
    - api_hasura_release_access.status | default(0) != 200

- name: show hasura upgrade fallback decision
  debug:
    msg: >-
      GitHub release lookup failed (HTTP {{ api_hasura_release_access.status | default('unknown') }}),
      reusing existing Hasura container and upgrading metadata only.
  when:
    - installation_mode == "upgrade"
    - api_use_existing_hasura_on_upgrade | bool
    - api_hasura_release_access is defined
    - api_hasura_release_access.status | default(0) != 200

- name: stop MW for upgrading
  ansible.builtin.systemd:
    name: "{{ product_name }}-middleware"
    state: stopped
  become: true
  when: "'middlewareserver' in group_names and installation_mode == 'upgrade'"

- name: stop API service for upgrading
  ansible.builtin.systemd:
    name: "{{ api_service_name }}"
    state: stopped
  become: true
  when: installation_mode == "upgrade" and not (api_use_existing_hasura_on_upgrade | default(false) | bool)
  failed_when: false

- name: stop API container for upgrading
  docker_container:
    name: "{{ api_container_name }}"
    state: stopped
    container_default_behavior: no_defaults
  become: true
  become_user: "{{ fworch_user }}"
  when: installation_mode == "upgrade" and not (api_use_existing_hasura_on_upgrade | default(false) | bool)
  failed_when: false

- name: stop UI for upgrading
  ansible.builtin.systemd:
    name: "{{ product_name }}-ui"
    state: stopped
  become: true
  when: "'frontends' in group_names and installation_mode == 'upgrade'"

- name: check for api dir
  stat:
    path: "{{ fworch_home }}/api"
  register: api_dir_check

- name: backup api dir
  synchronize:
    src: "{{ fworch_home }}/api"
    dest: "{{ fworch_home }}/backup_api"
  delegate_to: "{{ inventory_hostname }}"
  when: api_dir_check.stat.exists and installation_mode == "upgrade"
  become: true

- name: remove api home
  file:
    path: "{{ api_home }}"
    state: absent
  become: true
  when: installation_mode != "upgrade" or not (api_use_existing_hasura_on_upgrade | default(false) | bool)

- name: create api home
  file:
    path: "{{ api_home }}"
    state: directory
    mode: "0755"
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
  become: true

- name: create api bin
  file:
    path: "{{ api_home }}/bin"
    state: directory
    mode: "0755"
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
  become: true

- name: install apache2
  import_tasks: api-apache-install-and-setup.yml

- name: hasura install 
  import_tasks: hasura-install.yml

- name: include upgrade script
  import_tasks: run-upgrades.yml
  when: "installation_mode == 'upgrade'"

- name: copy fwo_api.py for scripting from importer
  copy:
    src: roles/importer/files/importer/fwo_api.py
    dest: "{{ fworch_home }}/scripts/fwo_api.py"
    mode: "0644"
    owner: "{{ fworch_user}}"
    group: "{{ fworch_user}}"
  become: true

- name: api create documentation
  import_tasks: api-create-docu.yml
  when: api_docu | bool

- name: finalize handler for datarecovery
  set_fact:
    api_handler_guard: stop
  changed_when: true
  notify: "api handler"
  when: installation_mode == "upgrade"
  become: true

- name: set grants for hasura schemas (after hasura install)
  postgresql_query:
    db: "{{ fworch_db_name }}"
    query: "GRANT USAGE ON SCHEMA {{ item }} TO dbbackupusers; Grant select on ALL TABLES in SCHEMA {{ item }} to group dbbackupusers; ALTER DEFAULT PRIVILEGES IN SCHEMA {{ item }} GRANT SELECT ON TABLES TO group dbbackupusers;"
  become: true
  become_user: postgres
  loop:
    - hdb_catalog
