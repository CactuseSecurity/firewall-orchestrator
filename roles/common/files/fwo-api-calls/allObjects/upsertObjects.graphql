mutation upsertObjects(
  $mgmId: Int!
  $importId: bigint!
  $removedNwObjectUids: [String!]!
  $removedSvcObjectUids: [String!]!
  $removedUserUids: [String!]!
  $removedZoneUids: [String!]!
  $newNwObjects: [firewall_nw_object_insert_input!]!
  $newSvcObjects: [firewall_nw_service_insert_input!]!
  $newUsers: [firewall_nw_user_insert_input!]!
  $newZones: [firewall_zone_insert_input!]!
) {
  update_firewall_nw_object(
    where: {
      mgm_id: { _eq: $mgmId }
      obj_uid: { _in: $removedNwObjectUids }
      removed: { _is_null: true }
    }
    _set: { removed: $importId, active: false }
  ) {
    affected_rows
    returning {
      obj_id
      obj_uid
      obj_typ_id
    }
  }
  update_firewall_nw_service(
    where: {
      mgm_id: { _eq: $mgmId }
      svc_uid: { _in: $removedSvcObjectUids }
      removed: { _is_null: true }
    }
    _set: { removed: $importId, active: false }
  ) {
    affected_rows
    returning {
      svc_id
      svc_uid
    }
  }
  update_firewall_nw_user(
    where: {
      mgm_id: { _eq: $mgmId }
      user_uid: { _in: $removedUserUids }
      removed: { _is_null: true }
    }
    _set: { removed: $importId, active: false }
  ) {
    affected_rows
    returning {
      user_id
      user_uid
    }
  }
  update_firewall_zone(
    where: {
      mgm_id: { _eq: $mgmId }
      zone_name: { _in: $removedZoneUids }
      removed: { _is_null: true }
    }
    _set: { removed: $importId, active: false }
  ) {
    affected_rows
    returning {
      zone_id
      zone_name
    }
  }
  insert_firewall_nw_object(objects: $newNwObjects) {
    affected_rows
    returning {
      obj_id
      obj_uid
      obj_typ_id
    }
  }
  insert_firewall_nw_service(objects: $newSvcObjects) {
    affected_rows
    returning {
      svc_id
      svc_uid
    }
  }
  insert_firewall_nw_user(objects: $newUsers) {
    affected_rows
    returning {
      user_id
      user_uid
    }
  }
  insert_firewall_zone(objects: $newZones) {
    affected_rows
    returning {
      zone_id
      zone_name
    }
  }
}
