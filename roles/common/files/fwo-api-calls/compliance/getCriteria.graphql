query getCriteria {
  compliance_criterion (where: { removed: {_is_null: true} }){
    id
    name
    criterion_type
    content
	comment
    conditions(where: { removed: { _is_null: true } }) {
      id
      criterion_id
      group_order
      position
      field
      operator
      value_string
      value_int
      value_int_end
      value_ref
      created
      removed
    }
  }
}
