query getPolicyById($id: Int!) {
  compliance_policy_by_pk(id: $id) {
    id
    name
    created_date
    disabled
    criteria: policy_criterions(where: { removed: { _is_null: true } }) {
      criterion: criterion {
        content
        criterion_type
        id
        name
        conditions(where: { removed: { _is_null: true } }) {
          id
          criterion_id
          group_order
          position
          field
          operator
          value_string
          value_int
          value_int_end
          value_ref
          created
          removed
        }
      }
    }
  }
}
