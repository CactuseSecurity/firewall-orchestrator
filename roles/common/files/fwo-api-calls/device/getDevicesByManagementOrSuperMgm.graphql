query getDevicesByManagementOrSuperMgm($devIds: [Int!]) {
  management(
    where: {
      _or: [
        { devices: { dev_id: { _in: $devIds } } }
        { managementByMultiDeviceManagerId: {devices: {dev_id: {_in: $devIds}}} }
      ]
      hide_in_gui: { _eq: false }
      stm_dev_typ: {
        is_pure_routing_device: { _eq: false }
      }
    }
    order_by: { mgm_name: asc }
  ) {
    id: mgm_id
    name: mgm_name
    uid: mgm_uid
    is_super_manager
    devices(
      where: {
        dev_id: { _in: $devIds }
        hide_in_gui: { _eq: false }
        stm_dev_typ: { is_pure_routing_device: { _eq: false } }
      }
      order_by: { dev_name: asc }
    ) {
      id: dev_id
      name: dev_name
      uid: dev_uid
    }
    managementByMultiDeviceManagerId {
      id: mgm_id
      name: mgm_name
      uid: mgm_uid
      devices(
        where: {
          dev_id: { _in: $devIds }
          hide_in_gui: { _eq: false }
          stm_dev_typ: { is_pure_routing_device: { _eq: false } }
        }
        order_by: { dev_name: asc }
      ) {
        id: dev_id
        mgm_id: mgm_id
        name: dev_name
        uid: dev_uid
      }
    }
  }
}
