
query getOpenRequests ($states: [String!], $currentTime: timestamp! ){
  ext_request (where: { ext_request_state: {_in: $states}, _or: [{locked: {_eq: false}}, {lock_expires_at: {_lt: $currentTime}}] } order_by: { id: asc }){
    ...extRequestDetails
    owner: owner {
      id
      name
      app_id_external
      common_service_possible
    }
  }
}
