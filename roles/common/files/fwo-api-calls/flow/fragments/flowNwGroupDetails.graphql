fragment flowNwGroupDetails on flow_nwgroup {
  nwgroup_id
  name
  nwgrp_hash
  state
  removed_date
  show_in_request_module
  nwgroup_members(order_by: { nwobj_id: asc }) {
    nwgroup_id
    nwobj_id
    nwobject {
      nwobj_id
      name
      ip_start
      ip_end
      nwobj_hash
      state
      removed_date
      show_in_request_module
    }
  }
  nwgroup_mappings(order_by: { mgm_id: asc }) {
    flow_nwgroup_id
    objgrp_id
    mgm_id
    active_on_mgm
    management {
      mgm_id
      mgm_name
    }
    object {
      obj_id
      obj_name
      obj_ip
      obj_ip_end
      obj_uid
      active
      removed
    }
  }
}
