fragment flowNwGroupWithMembersFragment on flow_nwgroup {
  nwgrp_id
  name
  nwgrp_hash
  state
  removed_date
  show_in_request_module
  nwgroup_members(order_by: { nwobj_id: asc }) {
    nwgrp_id
    nwobj_id
    nwobject {
      nwobj_id
      name
      ip_start
      ip_end
      nwobj_hash
      state
      removed_date
      show_in_request_module
    }
  }
}
