fragment flowSvcGroupWithMembersFragment on flow_svcgroup {
  svcgrp_id
  name
  svcgrp_hash
  state
  removed_date
  show_in_request_module
  svcgroup_members(order_by: { svcobj_id: asc }) {
    svcgrp_id
    svcobj_id
    svcobject {
      svcobj_id
      name
      port_start
      port_end
      ip_proto_id
      svcobj_hash
      state
      removed_date
      show_in_request_module
    }
  }
}
