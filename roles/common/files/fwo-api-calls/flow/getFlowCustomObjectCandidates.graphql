query getFlowCustomObjectCandidates($management_id: [Int!]) {
  management(
    where: {
      mgm_id: { _in: $management_id }
      hide_in_gui: { _eq: false }
      stm_dev_typ: {
        dev_typ_is_multi_mgmt: { _eq: false }
        is_pure_routing_device: { _eq: false }
      }
    }
    order_by: { mgm_name: asc }
  ) {
    id: mgm_id
    name: mgm_name
    networkObjects: objects(
      where: {
        active: { _eq: true }
        removed: { _is_null: true }
      }
      order_by: [{ obj_name: asc }, { obj_id: asc }]
    ) {
      obj_id
      obj_name
      obj_ip
      obj_ip_end
      obj_uid
      active
      type: stm_obj_typ {
        id: obj_typ_id
        name: obj_typ_name
      }
    }
  }
}
