mutation insertFlowNwObject(
  $name: String!
  $ipStart: cidr
  $ipEnd: cidr
  $nwobjHash: String!
  $state: String!
  $showInRequestModule: Boolean!
) {
  insert_flow_nwobject(
    objects: {
      name: $name
      ip_start: $ipStart
      ip_end: $ipEnd
      nwobj_hash: $nwobjHash
      state: $state
      show_in_request_module: $showInRequestModule
    }
  ) {
    returning {
      nwobj_id
      name
      ip_start
      ip_end
      nwobj_hash
      state
      removed_date
      show_in_request_module
    }
  }
}
