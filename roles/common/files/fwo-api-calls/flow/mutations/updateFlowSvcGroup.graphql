mutation updateFlowSvcGroup(
  $svcgroupId: bigint!
  $name: String!
  $showInRequestModule: Boolean!
) {
  update_flow_svcgroup_by_pk(
    pk_columns: { svcgroup_id: $svcgroupId }
    _set: {
      name: $name
      show_in_request_module: $showInRequestModule
    }
  ) {
    svcgroup_id
    name
    svcgrp_hash
    state
    removed_date
    show_in_request_module
  }
}
