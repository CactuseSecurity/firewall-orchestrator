mutation updateFlowSvcObject(
  $svcobjId: bigint!
  $name: String!
  $showInRequestModule: Boolean!
) {
  update_flow_svcobject_by_pk(
    pk_columns: { svcobj_id: $svcobjId }
    _set: {
      name: $name
      show_in_request_module: $showInRequestModule
    }
  ) {
    svcobj_id
    name
    port_start
    port_end
    ip_proto_id
    svcobj_hash
    state
    removed_date
    show_in_request_module
    services(order_by: { svc_name: asc }) {
      svc_id
      svc_name
      svc_port
      svc_port_end
      svc_uid
      active
      removed
      flow_svcobj_id
      flow_active
    }
  }
}
