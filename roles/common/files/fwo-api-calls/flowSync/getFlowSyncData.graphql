query getFlowSyncData($mgmId: Int!) {
  flow_nwobject(order_by: { nwobj_id: asc }) {
    nwobj_id
    name
    ip_start
    ip_end
    nwobj_hash
    state
    removed_date
    show_in_request_module
    objects(where: { mgm_id: { _eq: $mgmId } }) {
      obj_id
      obj_uid
      removed
    }
  }
  flow_nwgroup(order_by: { nwgrp_id: asc }) {
    nwgrp_id
    name
    nwgrp_hash
    state
    removed_date
    show_in_request_module
    nwgroup_members(order_by: { nwobj_id: asc }) {
      nwgrp_id
      nwobj_id
    }
    objects(where: { mgm_id: { _eq: $mgmId } }) {
      obj_id
      obj_uid
      removed
    }
  }
  flow_svcobject(order_by: { svcobj_id: asc }) {
    svcobj_id
    name
    port_start
    port_end
    ip_proto_id
    svcobj_hash
    state
    removed_date
    show_in_request_module
    services(where: { mgm_id: { _eq: $mgmId } }) {
      svc_id
      svc_uid
      removed
    }
  }
  flow_svcgroup(order_by: { svcgrp_id: asc }) {
    svcgrp_id
    name
    svcgrp_hash
    state
    removed_date
    show_in_request_module
    svcgroup_members(order_by: { svcobj_id: asc }) {
      svcgrp_id
      svcobj_id
    }
    services(where: { mgm_id: { _eq: $mgmId } }) {
      svc_id
      svc_uid
      removed
    }
  }
  flow_timeobject(order_by: { timeobj_id: asc }) {
    timeobj_id
    name
    start_time
    end_time
    timeobj_hash
    state
    removed_date
    show_in_request_module
    time_objects(where: { mgm_id: { _eq: $mgmId } }) {
      time_obj_id
      time_obj_uid
      removed
    }
  }
  flow_access(order_by: { access_id: asc }) {
    access_id
    access_hash
    requester_id
    owner_id
    state
    removed_date
    access_sources(order_by: { nwobj_id: asc }) {
      access_id
      nwobj_id
    }
    access_source_grps(order_by: { nwgrp_id: asc }) {
      access_id
      nwgrp_id
    }
    access_destinations(order_by: { nwobj_id: asc }) {
      access_id
      nwobj_id
    }
    access_destination_grps(order_by: { nwgrp_id: asc }) {
      access_id
      nwgrp_id
    }
    access_services(order_by: { svcobj_id: asc }) {
      access_id
      svcobj_id
    }
    access_service_grps(order_by: { svcgrp_id: asc }) {
      access_id
      svcgrp_id
    }
    access_timeobjects(order_by: { timeobj_id: asc }) {
      access_id
      timeobj_id
    }
    rules(where: { mgm_id: { _eq: $mgmId } }) {
      rule_id
      rule_uid
      removed
    }
  }
}
