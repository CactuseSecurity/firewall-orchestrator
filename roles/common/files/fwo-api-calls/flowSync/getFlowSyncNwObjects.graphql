query getFlowSyncNwObjects($mgmId: Int!) {
  flow_nwobject(order_by: { nwobj_id: asc }) {
    nwobj_id
    name
    ip_start
    ip_end
    nwobj_hash
    state
    removed_date
    show_in_request_module
    objects(where: { mgm_id: { _eq: $mgmId } }) {
      obj_id
      obj_uid
      removed
    }
  }
}
