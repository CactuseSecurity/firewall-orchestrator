query getFlowSyncSvcGroups($mgmId: Int!) {
  flow_svcgroup(order_by: { svcgrp_id: asc }) {
    svcgrp_id
    name
    svcgrp_hash
    state
    removed_date
    show_in_request_module
    svcgrp_members: svcgroup_members(order_by: { svcobj_id: asc }) {
      svcgrp_id
      svcobj_id
    }
    services(where: { mgm_id: { _eq: $mgmId } }) {
      svc_id
      svc_uid
      removed
    }
  }
}
