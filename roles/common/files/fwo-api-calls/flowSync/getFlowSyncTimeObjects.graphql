query getFlowSyncTimeObjects($mgmId: Int!) {
  flow_timeobject(order_by: { timeobj_id: asc }) {
    timeobj_id
    name
    start_time
    end_time
    timeobj_hash
    state
    removed_date
    show_in_request_module
    time_objects(where: { mgm_id: { _eq: $mgmId } }) {
      time_obj_id
      time_obj_uid
      removed
    }
  }
}
