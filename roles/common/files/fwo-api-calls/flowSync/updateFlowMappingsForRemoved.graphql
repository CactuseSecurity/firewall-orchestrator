mutation updateFlowMappingsForRemoved($mgmId: Int!) {
  update_rule(
    where: { mgm_id: { _eq: $mgmId }, removed: { _is_null: false } }
    _set: { flow_access_id: null }
  ) {
    affected_rows
  }
  update_object(
    where: { mgm_id: { _eq: $mgmId }, removed: { _is_null: false } }
    _set: { flow_nwgrp_id: null, flow_nwobj_id: null, flow_active: false }
  ) {
    affected_rows
  }
  update_service(
    where: { mgm_id: { _eq: $mgmId }, removed: { _is_null: false } }
    _set: { flow_svcgrp_id: null, flow_svcobj_id: null, flow_active: false }
  ) {
    affected_rows
  }
  update_time_object(
    where: { mgm_id: { _eq: $mgmId }, removed: { _is_null: false } }
    _set: { flow_timeobj_id: null, flow_active: false }
  ) {
    affected_rows
  }
}
