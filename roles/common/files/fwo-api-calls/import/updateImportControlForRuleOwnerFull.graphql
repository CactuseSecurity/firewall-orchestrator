mutation updateImportControlForRuleOwnerFull($controlId: bigint!, $stopTime: timestamp, $successful: Boolean, $rule_owner_mapping_done: Boolean!) {
  update_import_control(
    where: { control_id: { _eq: $controlId } },
    _set: { 
      stop_time: $stopTime,
      successful_import: $successful,
      rule_owner_mapping_done: $rule_owner_mapping_done
    }
  ) {
    affected_rows
    returning {
      control_id
      stop_time
      successful_import
      rule_owner_mapping_done
    }
  }
}