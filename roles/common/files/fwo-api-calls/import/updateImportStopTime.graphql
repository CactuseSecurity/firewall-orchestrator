
mutation updateImportStopTime($importId: bigint!, $stopTime: timestamp!, $success: Boolean, $policyChangesFound: Boolean!, $changesFound: Boolean!, $changeNumber: Int!) {
    update_import_control(where: {control_id: {_eq: $importId}}, _set: {stop_time: $stopTime, successful_import: $success, policy_changes_found: $policyChangesFound, changes_found: $changesFound, security_relevant_changes_counter: $changeNumber}) {
        affected_rows
    }
}