mutation updateConnectionPublish(
  $id: Int!
  $isPublished: Boolean
  $isRequested: Boolean
  $appId: Int
  $proposedAppId: Int
  ) {
  update_modelling_connection_by_pk(
    pk_columns: { id: $id }
    _set: {
      is_requested: $isRequested
      is_published: $isPublished
      app_id: $appId
      proposed_app_id: $proposedAppId
  }) {
    updatedId: id
  }
}
