fragment networkServiceDetailsForVariance on service {
  svc_id
  svc_name
  svc_port
  svc_port_end
  ip_proto_id
  service_type: stm_svc_typ {
    name: svc_typ_name
  }
  svcgrp_flats(
    where: {
      active: { _eq: $active }
      import_created: { _lte: $import_id_end }
      _or: [
        { removed: { _is_null: true } }
        { removed: { _gt: $import_id_start } }
      ]
    }
    order_by: { svcgrp_flat_member_id: asc }
  ) {
    byFlatId: serviceBySvcgrpFlatMemberId {
      svc_id
      svc_name
      svc_port
      svc_port_end
      ip_proto_id
      service_type: stm_svc_typ {
        name: svc_typ_name
      }
    }
  }
}
