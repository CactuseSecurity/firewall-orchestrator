query getOwnersForDnsWithModellingWithConn ($dns: [String!]!) {
  owner_list: owner (
    where: {
      owner_responsibles: {
        dn: {_in: $dns},
        owner_responsible_type: {
          active: {_eq: true},
          allow_modelling: {_eq: true}
        }
      }
    },
    order_by: { name: asc }
  ) {
    ...ownerDetails
    connections_aggregate {
      aggregate { count }
    }
  }
}
