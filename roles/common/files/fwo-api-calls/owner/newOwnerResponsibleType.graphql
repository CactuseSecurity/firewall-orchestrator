mutation newOwnerResponsibleType($name: String!, $active: Boolean!, $sort_order: Int!, $allow_modelling: Boolean!, $allow_recertification: Boolean!) {
  insert_owner_responsible_type(objects: { name: $name, active: $active, sort_order: $sort_order, allow_modelling: $allow_modelling, allow_recertification: $allow_recertification }) {
    returning {
      newId: id
    }
  }
}
