
query statisticsCurrentOverall {
  firewall_nw_object_aggregate(where: { active: { _eq: true } }) {
    aggregate {
      count
    }
  }
  firewall_nw_service_aggregate(where: { active: { _eq: true } }) {
    aggregate {
      count
    }
  }
  firewall_nw_user_aggregate(where: { active: { _eq: true } }) {
    aggregate {
      count
    }
  }
  firewall_rule_aggregate(where: { active: { _eq: true } }) {
    aggregate {
      count
    }
  }
}
