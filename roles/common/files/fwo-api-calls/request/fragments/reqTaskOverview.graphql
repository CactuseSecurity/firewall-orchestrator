fragment reqTaskOverview on request_reqtask {
  id
  ticket_id
  title
  task_number
  state_id
  task_type
  request_action
  rule_action
  rule_tracking
  start
  stop
  reason
  additional_info
  on_management: management {
    id: mgm_id
    name: mgm_name
  }
  implementation_tasks: impltasks {
    id
    title
    task_number
    state_id
    start
    stop
  }
  request_approvals: approvals {
    id
    task_id
    state_id
    date_opened
    approval_date
  }
  comments: reqtask_comments {
    comment: comment {
      comment_text
    }
  }
}
