
query getStates {
  state_list: request_state (order_by: { id: asc }){
    id
    name
    automatic_only
    actions: state_actions(order_by: [{ sort_order: asc }, { action_id: asc }]) {
      sort_order
      action: action {
        id
        name
        action_type
        scope
        task_type
        phase
        event
        button_text
        external_parameters
      }
    }
  }
}
