fragment ruleDetailsForVariance on rule {
  rule_id
  rule_uid
  mgm_id
  dev_id
  rule_action
  rulebase_id
  rule_comment
  rule_disabled
  rule_src_neg
  rule_dst_neg
  rule_svc_neg
  rule_num_numeric
  rule_name
  rule_custom_fields
  rule_froms(
    where: {
      active: { _eq: $active }
      rf_create: { _lte: $import_id_end }
      _or: [
        { removed: { _is_null: true } }
        { removed: { _gt: $import_id_start } }
      ]
    }
    order_by: { object: { obj_name: asc } }
  ) {
    usr {
      ...userDetailsForVariance
    }
    object {
      ...networkObjectDetailsForVariance
    }
  }
  rule_tos(
    where: {
      active: { _eq: $active }
      rt_create: { _lte: $import_id_end }
      _or: [
        { removed: { _is_null: true } }
        { removed: { _gt: $import_id_start } }
      ]
    }
    order_by: { object: { obj_name: asc } }
  ) {
    usr {
      ...userDetailsForVariance
    }
    object {
      ...networkObjectDetailsForVariance
    }
  }
  rule_services(
    where: {
      active: { _eq: $active }
      rs_create: { _lte: $import_id_end }
      _or: [
        { removed: { _is_null: true } }
        { removed: { _gt: $import_id_start } }
      ]
    }
    order_by: { service: { svc_name: asc } }
  ) {
    service {
      ...networkServiceDetailsForVariance
    }
  }
  rule_enforced_on_gateways(order_by: { device: { dev_name: asc } }) {
    device {
      id: dev_id
      name: dev_name
    }
  }
}
