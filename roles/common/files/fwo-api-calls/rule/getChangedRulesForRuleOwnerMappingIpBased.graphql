query getChangedRulesForRuleOwnerMappingIpBased($controlId: bigint!) {
  changelog_rule(where: { control_id: { _eq: $controlId } }) {
    import: import_control {
      control_id
      import_type_id
    }

    change_action

    old: ruleByOldRuleId(where: { removed: { _is_null: true } }) {
      rule_id
      rule_name

      rule_metadatum {
        rule_metadata_id
      }

      rule_tos(where: { removed: { _is_null: true } }) {
        object {
          obj_id
          obj_ip
          obj_ip_end
          obj_name
          removed
        }
      }

      rule_froms(where: { removed: { _is_null: true } }) {
        object {
          obj_id
          obj_ip
          obj_ip_end
          obj_name
          removed
        }
      }
    }

    new: rule(where: { removed: { _is_null: true } }) {
      rule_id
      rule_name

      rule_metadatum {
        rule_metadata_id
      }

      rule_tos(where: { removed: { _is_null: true } }) {
        object {
          obj_id
          obj_ip
          obj_ip_end
          obj_name
          removed
        }
      }

      rule_froms(where: { removed: { _is_null: true } }) {
        object {
          obj_id
          obj_ip
          obj_ip_end
          obj_name
          removed
        }
      }
    }
  }
}
