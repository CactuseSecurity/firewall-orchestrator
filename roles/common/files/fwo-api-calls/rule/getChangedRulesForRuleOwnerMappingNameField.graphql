
query getChangedRulesForRuleOwnerMappingNameField($controlId: bigint!) {
  changelog_rule(where: { control_id: { _eq: $controlId } }) {
    import: import_control {
      control_id
      import_type_id
    }
    change_action
    old: ruleByOldRuleId  {
      rule_id
      rule_name
      rule_metadatum {
        rule_metadata_id
      }
    }
    new: rule {
      rule_id
      rule_name
      rule_metadatum {
        rule_metadata_id
      }
    }
  }
}
