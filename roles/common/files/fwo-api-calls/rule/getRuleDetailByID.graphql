query RuleDetailById($rule_ids: [bigint!]!) {
    rule(where: {rule_id: {_in: $rule_ids}}) {
        rule_uid
        rule_id
        mgm_id
        rule_froms(order_by:{ object: {obj_id: asc}}){
            object{
                obj_name
                obj_ip
            }
        }
        rule_tos(order_by: { object: { obj_name: asc } }) {
            object {
                obj_name
                obj_ip
            }
        }
        rule_services(order_by: { service: { svc_name: asc } }) {
            service {
                svc_name
                ip_proto_id
                protocol_name: stm_ip_proto {
                    name: ip_proto_name
                }
                svc_port
            }
        }
        rule_custom_fields
        rule_name
        rule_create
        rule_last_seen
        rule_action
    }
}