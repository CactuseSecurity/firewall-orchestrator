query RuleDetailById(
    $rule_ids: [bigint!]
    $rule_action: String
) {
    rule(
        where:{
            rule_id: {_in: $rule_ids}
            rule_action: { _eq: $rule_action}
            removed: { _is_null: true }
        }
    ) {
        rule_uid
        rule_id
        mgm_id
        rule_froms(order_by:{ object: {obj_id: asc}}){
            object{
                obj_id
                obj_name
                obj_ip
                obj_ip_end
                type: stm_obj_type {
                    name: obj_typ_name
                }
                objgrp_flats(
                    where: {
                        active: { _eq: true }
                        removed: { _is_null: true }
                    }
                ) {
                    id_flat: objgrp_flat_id
                    byFlatId: objectByObjgrpFlatMemberId {
                        obj_id
                        obj_name
                        obj_ip
                        obj_ip_end 
                        obj_member_refs
                        type: stm_obj_typ {
                            name: obj_typ_name
                        }
                    }
                }
            }
        }
        rule_tos(order_by: { object: { obj_name: asc } }) {
            object {
                obj_id
                obj_name
                obj_ip
                obj_ip_end
                type: stm_obj_type {
                    name: obj_typ_name
                }
                objgrp_flats(
                    where: {
                        active: { _eq: true }
                        removed: { _is_null: true }
                    }
                ) {
                    id_flat: objgrp_flat_id
                    byFlatId: objectByObjgrpFlatMemberId {
                        obj_id
                        obj_name
                        obj_ip
                        obj_ip_end
                        obj_member_refs
                        type: stm_obj_typ {
                            name: obj_typ_name
                        }
                    }
                }
            }
        }
        rule_services(order_by: { service: { svc_name: asc } }) {
            service {
                svc_id
                svc_uid
                svc_name
                svc_port_end
                svc_member_refs
                service_type: stm_svc_typ {
                    name: svc_typ_name
                }
                ip_proto_id
                protocol_name: stm_ip_proto {
                    id: ip_proto_id
                    name: ip_proto_name
                }
                svc_port
                svcgrp_flats(
                    where: {
                        active: { _eq: true }
                        removed: { _is_null: true }
                    }
                    order_by: { svcgrp_flat_member_id: asc }
                ) {
                    flat_id: svcgrp_flat_id
                    byFlatId: serviceBySvcgrpFlatMemberId {
                        svc_id
                        svc_uid
                        svc_name
                        svc_port
                        svc_port_end
                        svc_member_refs
                        ip_proto_id
                        protocol_name: stm_ip_proto {
                            id: ip_proto_id
                            name: ip_proto_name
                        }
                        service_type: stm_svc_typ {
                            name: svc_typ_name
                        }
                    }
                }
            }
        }
        rule_times(
            where: {
                removed: { _is_null: true }
            }
        ) {
            time_obj_id
            time_object {
                time_obj_name
            }
        }
        rule_custom_fields
        rule_name
        rule_last_seen
        rule_action
        rule_comment
        createdImport: import_control {
            start_time
        }
        rule_metadatum {
            rule_last_hit
        }
        rule_owners
        {
            owner_id
        }
    }
}
