query getTimeBasedRulesByOwner {
  rule_owner(
    where: {
      removed: { _is_null: true }
      owner: { active: { _eq: true } }
      rule: {
        removed: { _is_null: true }
        rule_times: {
          removed: { _is_null: true }
          time_object: { removed: { _is_null: true }, end_time: { _is_null: false } }
        }
      }
    }
  ) {
    owner {
      id
      name
      app_id_external
    }
    rule {
      rule_id
      rule_uid
      rule_name
      mgm_id
      rule_num
      rule_src_neg
      rule_dst_neg
      rule_svc_neg
      rule_src
      rule_dst
      rule_svc
      rule_custom_fields
      rule_metadatum {
        rule_last_hit
      }
      rulebase {
        name
      }
      rule_froms(
        where: {
          removed: { _is_null: true }
          object: { removed: { _is_null: true } }
        }
        order_by: { object: { obj_name: asc } }
      ) {
        usr {
          user_id
          user_uid
          user_name
        }
        object {
          obj_id
          obj_uid
          obj_name
          obj_ip
          obj_ip_end
          obj_member_refs
          type: stm_obj_typ {
            id: obj_typ_id
            name: obj_typ_name
          }
          objgrp_flats(
            where: {
              active: { _eq: true }
              removed: { _is_null: true }
            }
            order_by: { objgrp_flat_member_id: asc }
          ) {
            flat_id: objgrp_flat_id
            byFlatId: objectByObjgrpFlatMemberId {
              obj_id
              obj_uid
              obj_name
              obj_ip
              obj_ip_end
              obj_member_refs
              type: stm_obj_typ {
                name: obj_typ_name
              }
            }
          }
        }
      }
      rule_tos(
        where: {
          removed: { _is_null: true }
          object: { removed: { _is_null: true } }
        }
        order_by: { object: { obj_name: asc } }
      ) {
        usr {
          user_id
          user_uid
          user_name
        }
        object {
          obj_id
          obj_uid
          obj_name
          obj_ip
          obj_ip_end
          obj_member_refs
          type: stm_obj_typ {
            id: obj_typ_id
            name: obj_typ_name
          }
          objgrp_flats(
            where: {
              active: { _eq: true }
              removed: { _is_null: true }
            }
            order_by: { objgrp_flat_member_id: asc }
          ) {
            flat_id: objgrp_flat_id
            byFlatId: objectByObjgrpFlatMemberId {
              obj_id
              obj_uid
              obj_name
              obj_ip
              obj_ip_end
              obj_member_refs
              type: stm_obj_typ {
                name: obj_typ_name
              }
            }
          }
        }
      }
      rule_services(
        where: {
          removed: { _is_null: true }
          service: { removed: { _is_null: true } }
        }
        order_by: { service: { svc_name: asc } }
      ) {
        service {
          svc_id
          svc_uid
          svc_name
          svc_port
          svc_port_end
          svc_member_refs
          service_type: stm_svc_typ {
            name: svc_typ_name
          }
          ip_proto_id
          protocol_name: stm_ip_proto {
            id: ip_proto_id
            name: ip_proto_name
          }
          svcgrp_flats(
            where: {
              active: { _eq: true }
              removed: { _is_null: true }
            }
            order_by: { svcgrp_flat_member_id: asc }
          ) {
            flat_id: svcgrp_flat_id
            byFlatId: serviceBySvcgrpFlatMemberId {
              svc_id
              svc_uid
              svc_name
              svc_port
              svc_port_end
              svc_member_refs
              ip_proto_id
              protocol_name: stm_ip_proto {
                id: ip_proto_id
                name: ip_proto_name
              }
              service_type: stm_svc_typ {
                name: svc_typ_name
              }
            }
          }
        }
      }
      rule_times(
        where: {
          removed: { _is_null: true }
          time_object: { removed: { _is_null: true }, end_time: { _is_null: false } }
        }
      ) {
        time_obj_id
        time_object {
          time_obj_id
          time_obj_name
          end_time
        }
      }
    }
  }
}
