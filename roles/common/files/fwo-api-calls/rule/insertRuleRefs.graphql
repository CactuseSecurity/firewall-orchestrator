mutation insertRuleRefs(
    $ruleFroms: [firewall_rule_from_insert_input!]!
    $ruleTos: [firewall_rule_to_insert_input!]!
    $ruleServices: [firewall_rule_service_insert_input!]!
    $ruleNwObjResolveds: [firewall_rule_nw_object_resolved_insert_input!]!
    $ruleSvcResolveds: [firewall_rule_nw_service_resolved_insert_input!]!
    $ruleUserResolveds: [firewall_rule_nw_user_resolved_insert_input!]!
    $ruleFromZones: [firewall_rule_from_zone_insert_input!]!
    $ruleToZones: [firewall_rule_to_zone_insert_input!]!
    $ruleTimes: [firewall_rule_time_insert_input!]!
) {
    insert_firewall_rule_from(objects: $ruleFroms) {
        affected_rows
    }
    insert_firewall_rule_to(objects: $ruleTos) {
        affected_rows
    }
    insert_firewall_rule_service(objects: $ruleServices) {
        affected_rows
    }
    insert_firewall_rule_nw_object_resolved(objects: $ruleNwObjResolveds) {
        affected_rows
    }
    insert_firewall_rule_nw_service_resolved(objects: $ruleSvcResolveds) {
        affected_rows
    }
    insert_firewall_rule_nw_user_resolved(objects: $ruleUserResolveds) {
        affected_rows
    }
    insert_firewall_rule_from_zone(objects: $ruleFromZones) {
        affected_rows
    }
    insert_firewall_rule_to_zone(objects: $ruleToZones) {
        affected_rows
    }
    insert_firewall_rule_time(objects: $ruleTimes) {
        affected_rows
    }
}