mutation updateRuleRefs(
    $importId: bigint!
    $ruleFroms: [firewall_rule_from_bool_exp!]!
    $ruleTos: [firewall_rule_to_bool_exp!]!
    $ruleServices: [firewall_rule_service_bool_exp!]!
    $ruleNwObjResolveds: [firewall_rule_nw_object_resolved_bool_exp!]
    $ruleSvcResolveds: [firewall_rule_nw_service_resolved_bool_exp!]!
    $ruleUserResolveds: [firewall_rule_nw_user_resolved_bool_exp!]!
    $ruleFromZones: [firewall_rule_from_zone_bool_exp!]
    $ruleToZones: [firewall_rule_to_zone_bool_exp!]
    $ruleTimes: [firewall_rule_time_bool_exp!]
) {
    update_firewall_rule_from(where: {
        _or: $ruleFroms
        removed: {_is_null: true}
    }, _set: {
        removed: $importId
        active: false
    }) {
        affected_rows
    }
    update_firewall_rule_to(where: {
        _or: $ruleTos
        removed: {_is_null: true}
    }, _set: {
        removed: $importId
        active: false
    }) {
        affected_rows
    }
    update_firewall_rule_service(where: {
        _or: $ruleServices
        removed: {_is_null: true}
    }, _set: {
        removed: $importId
        active: false
    }) {
        affected_rows
    }
    update_firewall_rule_nw_object_resolved(where: {
        _or: $ruleNwObjResolveds
        removed: {_is_null: true}
    }, _set: {
        removed: $importId
    }) {
        affected_rows
    }
    update_firewall_rule_nw_service_resolved(where: {
        _or: $ruleSvcResolveds
        removed: {_is_null: true}
    }, _set: {
        removed: $importId
    }) {
        affected_rows
    }
    update_firewall_rule_nw_user_resolved(where: {
        _or: $ruleUserResolveds
        removed: {_is_null: true}
    }, _set: {
        removed: $importId
    }) {
        affected_rows
    }
    update_firewall_rule_from_zone(where: {
        _or: $ruleFromZones
        removed: {_is_null: true}
    }, _set: {
        removed: $importId
    }) {
        affected_rows
    }
    update_firewall_rule_to_zone(where: {
        _or: $ruleToZones
        removed: {_is_null: true}
    }, _set: {
        removed: $importId
    }) {
        affected_rows
    }
    update_firewall_rule_time(where: {
        _or: $ruleTimes
        removed: {_is_null: true}
    }, _set: {
        removed: $importId
    }) {
        affected_rows
    }
}