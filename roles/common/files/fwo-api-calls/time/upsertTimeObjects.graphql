mutation upsertTimeObjects(
  $mgmId: Int!
  $importId: bigint!
  $removedTimeObjectIds: [bigint!]!
  $newTimeObjects: [time_object_insert_input!]!
) {
  update_time_object(
    where: {
      mgm_id: { _eq: $mgmId }
      time_obj_id: { _in: $removedTimeObjectIds }
      removed: { _is_null: true }
    }
    _set: { removed: $importId }
  ) {
    affected_rows
  }
  insert_time_object(objects: $newTimeObjects) {
    affected_rows
    returning {
      time_obj_id
      time_obj_uid
    }
  }
}
