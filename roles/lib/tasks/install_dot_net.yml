- block:

    - set_fact: distribution_version="{{ ansible_facts['distribution_major_version'] }}"    
      when: ansible_facts['distribution']|lower == 'debian'

    - set_fact: distribution_version="{{ ansible_facts['distribution_version'] }}"    
      when: ansible_facts['distribution']|lower == 'ubuntu'

    - set_fact: distribution_version="{{ debian_testing_version }}"    
      when: ansible_facts['distribution_release']|lower == debian_testing_release_name

    # include Microsoft package source to access newer .NET SDK versions
    - block:
      - name: get package list from ms {{ dotnet_deb_name }}
        get_url:
          url: "https://packages.microsoft.com/config/{{ ansible_facts['distribution']|lower }}/{{ distribution_version }}/{{ dotnet_deb_name }}"
          dest: "{{ lib_tmp_dir }}/{{ dotnet_deb_name }}"
          mode: "0644"

      - name: install ms package list
        apt:
          deb: "{{ lib_tmp_dir }}/{{ dotnet_deb_name }}"

      - name: remove package list file
        file:
          dest: "{{ lib_tmp_dir }}/{{ dotnet_deb_name }}"
          state: absent

      - name: apt update
        apt: update_cache=true

      when: ansible_facts['distribution']|lower in ['ubuntu', 'debian']

    - name: Prefer Microsoft packages for .NET on Ubuntu >=22.04
      blockinfile:
        path: /etc/apt/preferences
        create: true
        block: |
          Package: dotnet-* aspnetcore-* netstandard-*
          Pin: origin packages.microsoft.com
          Pin-Priority: 999
      when: ansible_facts['distribution'] == "Ubuntu" and ansible_facts['distribution_major_version'] is version('22', '>=')

    - name: Install apt-transport-https
      package: name=apt-transport-https state=present

    - name: apt update
      apt: update_cache=true

    - name: Install .NET SDK {{ dotnet_version }} via apt
      apt:
        name: "dotnet-sdk-{{ dotnet_version }}"
        state: present
      register: dotnet_apt_install
      failed_when: false
      when: ansible_architecture == "x86_64"

    - name: Install .NET SDK {{ dotnet_version }} via script (fallback for missing apt package)
      block:
        # Vendored from https://dot.net/v1/dotnet-install.sh; update manually when needed.
        - name: Copy vendored dotnet-install script
          copy:
            src: dotnet-install.sh
            dest: "{{ lib_tmp_dir }}/dotnet-install.sh"
            mode: '0755'

        - name: Check installed .NET SDKs
          command: dotnet --list-sdks
          register: installed_sdks
          changed_when: false
          failed_when: false

        - name: Run dotnet install script
          command: "{{ lib_tmp_dir }}/dotnet-install.sh --channel {{ dotnet_version }} --install-dir /usr/share/dotnet"
          when: dotnet_version not in installed_sdks.stdout

        - name: Check if /usr/bin/dotnet exists
          stat:
            path: /usr/bin/dotnet
          register: dotnet_binary

        - name: Symlink dotnet binary to /usr/bin
          file:
            src: /usr/share/dotnet/dotnet
            dest: /usr/bin/dotnet
            state: link
            force: true
          when: not dotnet_binary.stat.exists or dotnet_binary.stat.islnk

      # Run this block if the apt package is missing or for all installs to be safe
      when: ansible_architecture == "x86_64" and (dotnet_apt_install is failed)

    - debug: 
        msg:
          - "NOTE: you need to install dotnet yourself for architectures other than x86_64 before running FWO installer"
      when: ansible_architecture != "x86_64"

  become: true
  environment: "{{ proxy_env }}"