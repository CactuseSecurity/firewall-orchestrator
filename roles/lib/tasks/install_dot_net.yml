- block:

    - set_fact: distribution_version="{{ ansible_facts['distribution_major_version'] }}"    
      when: ansible_facts['distribution']|lower == 'debian'

    - set_fact: distribution_version="{{ ansible_facts['distribution_version'] }}"    
      when: ansible_facts['distribution']|lower == 'ubuntu'

    - set_fact: distribution_version="{{ debian_testing_version }}"    
      when: ansible_facts['distribution_release']|lower == debian_testing_release_name

    # Debian: use Microsoft package source
    - block:
      - name: get package list from ms packages-microsoft-prod.deb
        get_url:
          url: "https://packages.microsoft.com/config/{{ ansible_facts['distribution']|lower }}/{{ distribution_version }}/packages-microsoft-prod.deb"
          dest: "{{ lib_tmp_dir }}/packages-microsoft-prod.deb"
          mode: "0644"

      - name: install ms package list
        apt:
          deb: "{{ lib_tmp_dir }}/packages-microsoft-prod.deb"

      - name: remove package list file
        file:
          dest: "{{ lib_tmp_dir }}/packages-microsoft-prod.deb"
          state: absent

      - name: apt update
        apt: update_cache=true

      when:
        - ansible_facts['distribution']|lower == 'debian'

    # Ubuntu: Microsoft no longer publishes .NET packages for Ubuntu.
    # Use the official Ubuntu .NET backports PPA instead (covers 22.04 + 24.04).
    - block:
      - name: Install software-properties-common (provides add-apt-repository)
        apt:
          name: software-properties-common
          state: present

      - name: Add Ubuntu .NET backports PPA
        apt_repository:
          repo: ppa:dotnet/backports
          state: present
          update_cache: true

      when:
        - ansible_facts['distribution']|lower == 'ubuntu'

    - name: Prefer Microsoft packages for .NET on Ubuntu >=22.04
      blockinfile:
        path: /etc/apt/preferences.d/microsoft-dotnet
        create: true
        block: |
          Package: dotnet-* aspnetcore-* netstandard-*
          Pin: origin packages.microsoft.com
          Pin-Priority: 1001
      when:
        - ansible_facts['distribution'] == "Ubuntu"
        - ansible_facts['distribution_major_version'] is version('22', '>=')

    - name: Install apt-transport-https
      package: name=apt-transport-https state=present

    - name: apt update
      apt: update_cache=true

    - name: Install .NET SDK {{ dotnet_version }} on x86_64
      apt:
        name: "dotnet-sdk-{{ dotnet_version }}"
        state: present
      when:
        - ansible_architecture == "x86_64"

    - debug: 
        msg:
          - "NOTE: you need to install dotnet yourself for architectures other than x86_64 before running FWO installer"
      when: ansible_architecture != "x86_64"

  become: true
  environment: "{{ proxy_env }}"
