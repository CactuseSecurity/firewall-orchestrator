- block:
    - name: Ensure Debian version is supported for .NET install
      assert:
        that:
          - ansible_facts['distribution_major_version'] is version('10', '>=')
        fail_msg: "Debian {{ ansible_facts['distribution_version'] }} is not supported. Minimum supported Debian version is 10."
      when: ansible_facts['distribution'] | lower == 'debian'

    - name: Ensure Ubuntu version is supported for .NET install
      assert:
        that:
          - ansible_facts['distribution_version'] is version('20.04', '>=')
        fail_msg: "Ubuntu {{ ansible_facts['distribution_version'] }} is not supported. Minimum supported Ubuntu version is 20.04."
      when: ansible_facts['distribution'] | lower == 'ubuntu'

    - name: Set Microsoft package feed version for Debian
      set_fact:
        dotnet_ms_repo_version: >-
          {{
            ansible_facts['distribution_major_version']
            if (ansible_facts['distribution_major_version'] | int) <= (debian_testing_version | int)
            else debian_testing_version
          }}
      when: ansible_facts['distribution'] | lower == 'debian'

    - name: Set Microsoft package feed version for Ubuntu
      set_fact:
        dotnet_ms_repo_version: >-
          {{
            '24.04'
            if ansible_facts['distribution_version'] is version('24.04', '>=')
            else ('22.04' if ansible_facts['distribution_version'] is version('22.04', '>=') else '20.04')
          }}
      when: ansible_facts['distribution'] | lower == 'ubuntu'

    - name: Get package list from Microsoft {{ dotnet_deb_name }}
      get_url:
        url: "https://packages.microsoft.com/config/{{ ansible_facts['distribution'] | lower }}/{{ dotnet_ms_repo_version }}/{{ dotnet_deb_name }}"
        dest: "{{ lib_tmp_dir }}/{{ dotnet_deb_name }}"
        mode: "0644"

    - name: Install Microsoft package list
      apt:
        deb: "{{ lib_tmp_dir }}/{{ dotnet_deb_name }}"

    - name: Remove package list file
      file:
        dest: "{{ lib_tmp_dir }}/{{ dotnet_deb_name }}"
        state: absent

    - name: apt update
      apt: update_cache=true

    # - name: update /etc/apt/preferences for ubuntu >=22 (https://github.com/dotnet/sdk/issues/27129)
    #   blockinfile:
    #     path: /etc/apt/preferences
    #     create: true
    #     block: |
    #       Package: dotnet-* aspnetcore-* netstandard-*
    #       Pin: origin packages.microsoft.com
    #       Pin-Priority: 999
    #   when: ansible_facts['distribution'] == "Ubuntu" and ansible_facts['distribution_major_version'] is version('22', '>=')

    # - name: make sure to use the ubuntu version of dotnet sdk on ubuntu >=22
    #   file:
    #     path: /etc/apt/sources.list.d/{{ item }}
    #     state: absent
    #   loop:
    #     - "{{ dotnet_deb_name }}"
    #     - microsoft-prod.list
    #   when: ansible_facts['distribution'] == "Ubuntu" and ansible_facts['distribution_major_version'] is version('22', '>=')

    - name: Install apt-transport-https
      package: name=apt-transport-https state=present

    - name: Install software-properties-common for apt repositories
      package:
        name: software-properties-common
        state: present
      when:
        - ansible_facts['distribution'] | lower == 'ubuntu'
        - ansible_facts['distribution_version'] is version('22.04', '>=')

    - name: Add .NET backports PPA on Ubuntu >=22.04
      apt_repository:
        repo: ppa:dotnet/backports
        state: present
        update_cache: true
      when:
        - ansible_facts['distribution'] | lower == 'ubuntu'
        - ansible_facts['distribution_version'] is version('22.04', '>=')

    - name: apt update
      apt: update_cache=true

    - name: Install dotnet-sdk-{{ dotnet_version }}
      package: "name=dotnet-sdk-{{ dotnet_version }} state=present"
      when: ansible_architecture == "x86_64"

    - debug: 
        msg:
          - "NOTE: you need to install dotnet yourself for architectures other than x86_64 before running FWO installer"
      when: ansible_architecture != "x86_64"

  become: true
  environment: "{{ proxy_env }}"
