- name: set add mode for creating ldap tree
  set_fact:
    ldif_changetype: add

- name: build ldap tls options
  set_fact:
    ldap_tls_opts: >-
      {% if openldap_server_enable_ssl | default(false) -%}
      -o TLS_REQCERT=never{% if openldap_server_cert is defined %} -o TLS_CACERT={{ openldap_server_cert }}{% endif %}
      {%- endif %}
    ldap_cmd_url: >-
      {% if openldap_server_enable_ssl | default(false) -%}
      ldaps://{{ openldap_server }}:{{ openldap_port | default(636) }}
      {%- else -%}
      ldap://{{ openldap_server }}:{{ (openldap_port | default(389) | int == 636) | ternary(389, openldap_port | default(389)) }}
      {%- endif %}

- name: create middleware ldif directory
  file:
    path: "{{ middleware_ldif_dir }}"
    state: directory
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
  become: true

- name: copy the ldif templates to system
  template:
    src: "{{ item }}"
    dest: "{{  middleware_ldif_dir }}/{{ item | basename | regex_replace('\\.j2$', '') }}"
    force: true
    owner: "{{ fworch_user }}"
    group: "{{ fworch_group }}"
  with_fileglob:
    - ../templates/ldif_files/*.j2
  become: true

- name: add tree
  command: "ldapmodify {{ ldap_tls_opts }} -H {{ ldap_cmd_url }} -D {{ openldap_superuser_dn }} -y {{ ldap_manager_pwd_file }} -x -f {{  middleware_ldif_dir }}/tree_{{ item }}.ldif"
  loop:
    - level_0
    - level_1
    - level_2
    - systemusers
    - roles
    - tenant0
    - operators
  register: ldap_initial_tree_result
  failed_when:
    - ldap_initial_tree_result.rc != 0
    - "'Already exists' not in ldap_initial_tree_result.stderr"
  changed_when: ldap_initial_tree_result.rc == 0
  become: true
