- name: copy the ldif templates to system once more (this time for adding entries)
  template:
    src: "{{ item }}"
    dest: "{{ middleware_ldif_dir }}/{{ item | basename | regex_replace('\\.j2$', '') }}"
    force: true
  with_fileglob:
    - ../templates/tree_*.j2
  become: true

- name: build ldap tls options
  set_fact:
    ldap_tls_opts: >-
      {% if openldap_server_enable_ssl | default(false) -%}
      -o TLS_REQCERT=never{% if openldap_server_cert is defined %} -o TLS_CACERT={{ openldap_server_cert }}{% endif %}
      {%- endif %}
    ldap_cmd_url: >-
      {% if openldap_server_enable_ssl | default(false) -%}
      ldaps://{{ openldap_server }}:{{ openldap_port | default(636) }}
      {%- else -%}
      ldap://{{ openldap_server }}:{{ (openldap_port | default(389) | int == 636) | ternary(389, openldap_port | default(389)) }}
      {%- endif %}

- name: ensure integration test user parent tree exists
  command: "ldapmodify {{ ldap_tls_opts }} -H {{ ldap_cmd_url }} -D {{ openldap_superuser_dn }} -y {{ ldap_manager_pwd_file }} -x -f {{ middleware_ldif_dir }}/tree_{{ item }}.ldif"
  loop:
    - integration_testuser_jwt_parent_level_0
    - integration_testuser_jwt_parent_user
    - integration_testuser_jwt_parent_group
    - integration_testuser_jwt_parent_operator
    - integration_testuser_jwt_parent_tenant0
  register: ldap_parent_result
  failed_when:
    - ldap_parent_result.rc != 0
    - "'Already exists' not in ldap_parent_result.stderr"
  changed_when: ldap_parent_result.rc == 0
  become: true

- name: add or modify tree entries
  command: "ldapmodify {{ ldap_tls_opts }} -H {{ ldap_cmd_url }} -D {{ openldap_superuser_dn }} -y {{ ldap_manager_pwd_file }} -x -f {{ middleware_ldif_dir }}/tree_{{ item }}.ldif"
  loop:
    - integration_testuser_jwt
  register: ldap_result
  failed_when: 
    - ldap_result.rc != 0
    - "'Already exists' not in ldap_result.stderr"
  changed_when: ldap_result.rc == 0
  become: true

- name: add tree
  command: "ldapmodify {{ ldap_tls_opts }} -H {{ ldap_cmd_url }} -D {{ openldap_superuser_dn }} -y {{ ldap_manager_pwd_file }} -x -f {{ middleware_ldif_dir }}/tree_{{ item }}.ldif"
  loop:
    - sample_tenants
    - sample_operators
    - sample_groups
  become: true

- name: add ui ambient smoke roles for test user
  command: "ldapmodify {{ ldap_tls_opts }} -H {{ ldap_cmd_url }} -D {{ openldap_superuser_dn }} -y {{ ldap_manager_pwd_file }} -x"
  args:
    stdin: |
      dn: cn={{ item }},ou=role,{{ openldap_path }}
      changetype: modify
      add: uniquemember
      uniquemember: uid=user1{{ sample_postfix }},ou=tenant1{{ sample_postfix }},ou=operator,ou=user,{{ openldap_path }}
  loop: "{{ ui_ambient_role_smoke_roles | default(['reporter', 'modeller', 'recertifier']) }}"
  register: ui_ambient_role_smoke_role_result
  failed_when:
    - ui_ambient_role_smoke_role_result.rc != 0
    - "'Type or value exists' not in ui_ambient_role_smoke_role_result.stderr"
  changed_when: ui_ambient_role_smoke_role_result.rc == 0
  become: true
  when:
    - sample_role_purpose is match('test')
    - run_ui_ambient_role_smoke | default(false) | bool

#only add roles and groups when not testing to avoid resudue from tests
- name: add tree
  command: "ldapmodify {{ ldap_tls_opts }} -H {{ ldap_cmd_url }} -D {{ openldap_superuser_dn }} -y {{ ldap_manager_pwd_file }} -x -f {{ middleware_ldif_dir }}/tree_{{ item }}.ldif"
  loop:
    - roles_for_sample_operators
    - groups_for_sample_operators
    - roles_for_integration_testuser
  become: true
  when: sample_role_purpose is not match('test')
