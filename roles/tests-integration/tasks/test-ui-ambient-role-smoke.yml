# Browser smoke test for UI ambient role coverage.
# Enable with run_ui_ambient_role_smoke=true.

- block:

  - name: set ambient role smoke test directory
    set_fact:
      ui_ambient_role_smoke_dir: "/tmp/fworch-ambient-role-smoke"
      ui_ambient_role_smoke_venv: "/tmp/fworch-ambient-role-smoke/venv"
      ui_ambient_role_smoke_browser_dir: "/tmp/fworch-ambient-role-smoke/ms-playwright"

  - name: copy ambient role smoke tests
    copy:
      src: ui/ambient_role_smoke/
      dest: "{{ ui_ambient_role_smoke_dir }}/"
      mode: "0644"

  - name: install ambient role smoke virtualenv package
    package:
      name: python3-venv
      state: present
    become: true
    environment: "{{ proxy_env }}"

  - name: install ambient role smoke python requirements
    pip:
      requirements: "{{ ui_ambient_role_smoke_dir }}/requirements.txt"
      virtualenv: "{{ ui_ambient_role_smoke_venv }}"
      virtualenv_command: python3 -m venv
    environment: "{{ proxy_env }}"

  - name: install ambient role smoke browser dependencies
    command: "{{ ui_ambient_role_smoke_venv }}/bin/python -m playwright install-deps chromium"
    become: true
    changed_when: false
    environment: "{{ proxy_env }}"

  - name: install ambient role smoke chromium browser
    command: "{{ ui_ambient_role_smoke_venv }}/bin/python -m playwright install chromium"
    changed_when: false
    environment: "{{ proxy_env | combine({'PLAYWRIGHT_BROWSERS_PATH': ui_ambient_role_smoke_browser_dir}) }}"

  - name: run ambient role smoke tests
    command: "{{ ui_ambient_role_smoke_venv }}/bin/python -m pytest -q {{ ui_ambient_role_smoke_dir }}"
    changed_when: false
    environment:
      PLAYWRIGHT_BROWSERS_PATH: "{{ ui_ambient_role_smoke_browser_dir }}"
      FWO_UI_BASE_URL: "https://{{ ui_hostname }}/"
      FWO_UI_USERNAME: "{{ ui_ambient_role_smoke_username | default('user1' ~ test_postfix) }}"
      FWO_UI_PASSWORD: "{{ ui_ambient_role_smoke_password | default(test_user1_pw) }}"
      FWO_UI_ROUTES: "{{ ui_ambient_role_smoke_routes | default('/settings/user,/settings/language,/settings/report,/settings/modellingpersonal,/settings/recertificationpersonal,/report/generation,/report/archive,/networkmodelling,/certification') }}"
      FWO_UI_HEADLESS: "{{ ui_ambient_role_smoke_headless | default('true') }}"
      FWO_UI_IGNORE_HTTPS_ERRORS: "{{ ui_ambient_role_smoke_ignore_https_errors | default('true') }}"
      FWO_UI_TIMEOUT_MS: "{{ ui_ambient_role_smoke_timeout_ms | default('30000') }}"

  when:
    - "'frontends' in group_names"
    - run_ui_ambient_role_smoke | default(false) | bool
